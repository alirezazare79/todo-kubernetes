name: CI/CD Todo App

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  IMAGE_NAME: harbor.kakor.ovh/ipim2il/alireza-todo-app
  IMAGE_TAG: 1.0
  OPENSHIFT_PROJECT: todo-kubernetes

jobs:
  build-scan-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Harbor
        run: |
          echo "${{ secrets.HARBOR_PASSWORD }}" | docker login harbor.kakor.ovh \
            -u "${{ secrets.HARBOR_USERNAME }}" \
            --password-stdin

      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG .
          docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:latest

      - name: Scan image with Trivy
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.70.0 image \
            --severity HIGH,CRITICAL \
            --exit-code 0 \
            $IMAGE_NAME:$IMAGE_TAG

      - name: Push Docker image to Harbor
        run: |
          docker push $IMAGE_NAME:$IMAGE_TAG
          docker push $IMAGE_NAME:latest

      - name: Install OpenShift CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Login to OpenShift
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
          openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
          insecure_skip_tls_verify: true

      - name: Deploy to OpenShift
        run: |
          oc project $OPENSHIFT_PROJECT
          oc apply -k k8s
          oc rollout restart deployment/alireza-todo-app
          oc rollout status deployment/alireza-todo-app